<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拼音学习轮盘</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&family=Kalam:wght@700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 30% 20%, rgba(50, 50, 100, 0.4) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(80, 40, 60, 0.3) 0%, transparent 60%);
            pointer-events: none;
        }

        .game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            margin-bottom: 80px;
            /* 轮盘整体上移，为下方拼音显示空出空间 */
        }

        canvas {
            display: block;
            border-radius: 50%;
            box-shadow:
                0 0 60px rgba(0, 0, 0, 0.5),
                0 0 120px rgba(0, 0, 0, 0.3);
        }

        .result-display {
            position: absolute;
            bottom: -90px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #fff;
            min-width: 300px;
        }

        .result-display .pinyin {
            font-family: 'Kalam', 'Noto Sans SC', cursive;
            font-size: 52px;
            font-weight: 700;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
            color: #FFD700;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .result-display .pinyin.show {
            opacity: 1;
            transform: scale(1);
        }

        .hint-bar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.35);
            font-size: 14px;
            letter-spacing: 2px;
            animation: pulse 2s ease-in-out infinite;
            transition: opacity 0.3s;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.35;
            }

            50% {
                opacity: 0.7;
            }
        }

        .pointer-mark {
            position: absolute;
            top: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 18px solid #FFD700;
            filter: drop-shadow(0 0 6px rgba(255, 215, 0, 0.6));
            z-index: 10;
        }

        /* 音调面板样式 */
        .tones-panel {
            position: fixed;
            right: -320px;
            /* 初始隐藏 */
            top: 20px;
            bottom: 20px;
            width: 280px;
            background: rgba(26, 26, 46, 0.85);
            backdrop-filter: blur(15px);
            border-left: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 24px 0 0 24px;
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.5);
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 100;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .tones-panel.show {
            right: 0;
        }

        .tones-panel-title {
            color: #FFD700;
            font-size: 18px;
            font-weight: bold;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
            padding-bottom: 10px;
            text-align: center;
        }

        .tone-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tone-item:hover {
            background: rgba(255, 215, 0, 0.15);
            border-color: #FFD700;
            transform: translateX(-5px);
        }

        .toned-pinyin {
            color: #FFFFFF;
            font-size: 20px;
            font-family: 'Times New Roman', serif;
        }

        .sample-char {
            color: #FFD700;
            font-size: 24px;
            font-weight: bold;
        }

        .tone-hint {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            text-align: center;
            margin-top: auto;
        }
    </style>
</head>

<body>

    <div class="game-container" id="gameContainer">
        <div class="pointer-mark"></div>
        <canvas id="wheelCanvas"></canvas>
        <div class="result-display">
            <div class="pinyin" id="resultPinyin"></div>
        </div>
    </div>

        <div id="tonesList"></div>
        <div class="tone-hint">点击项目朗读发音</div>
    </div>

            targetPinyin: null,

            // 锁定功能
            lockedShengmuIdx: null,
            lockedYunmuIdx: null,
            // 左右键平滑导航目标（null = 无导航中）
            navigatingOuterTarget: null,
            navigatingOuterDir: 0, // 1=顺时针, -1=逆时针, 0=无方向
            navigatingInnerTarget: null,
            navigatingInnerDir: 0
        };

        let animFrameId = null;
        let lastTime = 0;
        let lastOuterSector = -1;
        let lastInnerSector = -1;

        // ==================== 音频 ====================
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playTick(freq = 400, vol = 0.08, dur = 0.04) {
            initAudio();
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(vol, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
            o.start(); o.stop(audioCtx.currentTime + dur);
        }

        function playBounce(intensity = 1) {
            playTick(200 + intensity * 300, 0.05 * intensity, 0.04);
        }

        function playStartSound() {
            initAudio();
            [600, 800, 1000].forEach((f, i) => {
                setTimeout(() => playTick(f, 0.12, 0.06), i * 40);
            });
        }

        function playStopSound() {
            initAudio();
            playTick(500, 0.18, 0.15);
            setTimeout(() => playTick(300, 0.10, 0.2), 80);
        }

        function playWinSound() {
            initAudio();
            [523, 659, 784, 1047].forEach((f, i) => {
                setTimeout(() => playTick(f, 0.16, 0.25), i * 100);
            });
        }

        // ==================== 绘制函数 ====================

        function drawSector(cx, cy, innerR, outerR, startAngle, endAngle, baseColor) {
            const s = (startAngle - 90) * Math.PI / 180;
            const e = (endAngle - 90) * Math.PI / 180;

            ctx.beginPath();
            ctx.arc(cx, cy, outerR, s, e);
            ctx.arc(cx, cy, innerR, e, s, true);
            ctx.closePath();

            // 创建径向渐变模拟坡度 (里高外低)
            const grad = ctx.createRadialGradient(cx, cy, innerR, cx, cy, outerR);
            // 内部较亮，外部较暗
            grad.addColorStop(0, hexToRgba(baseColor, 1.25)); // 略亮
            grad.addColorStop(0.3, baseColor);
            grad.addColorStop(1, hexToRgba(baseColor, 0.7));  // 略暗

            ctx.fillStyle = grad;
            ctx.fill();
        }

        // 辅助函数：调整颜色亮度
        function hexToRgba(hex, factor) {
            // 简单的亮度调整逻辑
            let r = parseInt(hex.slice(1, 3), 16);
            let g = parseInt(hex.slice(3, 5), 16);
            let b = parseInt(hex.slice(5, 7), 16);
            r = Math.min(255, Math.floor(r * factor));
            g = Math.min(255, Math.floor(g * factor));
            b = Math.min(255, Math.floor(b * factor));
            return `rgb(${r},${g},${b})`;
        }

        function drawLockedGlow(cx, cy, innerR, outerR, startAngle, endAngle) {
            const s = (startAngle - 90) * Math.PI / 180;
            const e = (endAngle - 90) * Math.PI / 180;

            ctx.save();

            // 创建扇区路径
            const p = new Path2D();
            p.arc(cx, cy, outerR, s, e);
            p.arc(cx, cy, innerR, e, s, true);
            p.closePath();

            // 1. 剪裁：确保光线只在格子内部可见
            ctx.clip(p);

            // 2. 绘制背景基光 (略微增强)
            ctx.fillStyle = 'rgba(0, 242, 255, 0.15)';
            ctx.fill(p);

            // 3. 增强版荧光效果
            // 使用 lighter 混合模式让颜色更加饱和鲜艳
            ctx.globalCompositeOperation = 'lighter';
            ctx.shadowColor = '#00f2ff';

            // 第一层：核心高亮线 (非常明亮，范围窄)
            ctx.strokeStyle = 'rgba(200, 255, 255, 0.9)';
            ctx.shadowBlur = 8;
            ctx.lineWidth = 4;
            ctx.stroke(p);

            // 第二层：主发光层
            ctx.strokeStyle = 'rgba(0, 242, 255, 0.8)';
            ctx.shadowBlur = 25;
            ctx.lineWidth = 2.5;
            ctx.stroke(p);

            // 第三层：深层晕染 (增强范围和不透明度)
            ctx.strokeStyle = 'rgba(0, 242, 255, 0.6)';
            ctx.shadowBlur = 50;
            ctx.lineWidth = 1.5;
            ctx.stroke(p);

            // 第四层：广域微光
            ctx.strokeStyle = 'rgba(0, 242, 255, 0.3)';
            ctx.shadowBlur = 80;
            ctx.lineWidth = 1;
            ctx.stroke(p);

            ctx.restore();
        }

        function drawRail(cx, cy, innerR, outerR, angle) {
            const rad = (angle - 90) * Math.PI / 180;
            const x1 = cx + innerR * Math.cos(rad);
            const y1 = cy + innerR * Math.sin(rad);
            const x2 = cx + outerR * Math.cos(rad);
            const y2 = cy + outerR * Math.sin(rad);
            const perpX = -Math.sin(rad) * RAIL_WIDTH / 2;
            const perpY = Math.cos(rad) * RAIL_WIDTH / 2;

            ctx.beginPath();
            ctx.moveTo(x1 - perpX, y1 - perpY);
            ctx.lineTo(x2 - perpX, y2 - perpY);
            ctx.lineTo(x2 + perpX, y2 + perpY);
            ctx.lineTo(x1 + perpX, y1 + perpY);
            ctx.closePath();

            const grad = ctx.createLinearGradient(
                x1 - perpX, y1 - perpY, x1 + perpX, y1 + perpY
            );
            grad.addColorStop(0, RAIL_COLOR_DARK);
            grad.addColorStop(0.3, RAIL_HIGHLIGHT);
            grad.addColorStop(0.5, RAIL_COLOR_LIGHT);
            grad.addColorStop(0.7, RAIL_COLOR_MID);
            grad.addColorStop(1, RAIL_COLOR_DARK);
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.strokeStyle = 'rgba(139, 105, 20, 0.5)';
            ctx.lineWidth = 0.5;
            ctx.stroke();
        }

        function drawCircularRail(cx, cy, r, width) {
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.lineWidth = width;
            const grad = ctx.createRadialGradient(cx, cy, r - width / 2, cx, cy, r + width / 2);
            grad.addColorStop(0, RAIL_COLOR_DARK);
            grad.addColorStop(0.25, RAIL_COLOR_LIGHT);
            grad.addColorStop(0.5, RAIL_HIGHLIGHT);
            grad.addColorStop(0.75, RAIL_COLOR_MID);
            grad.addColorStop(1, RAIL_COLOR_DARK);
            ctx.strokeStyle = grad;
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(cx, cy, r - width / 2, 0, Math.PI * 2);
            ctx.lineWidth = 0.5;
            ctx.strokeStyle = 'rgba(100, 70, 10, 0.4)';
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(cx, cy, r + width / 2, 0, Math.PI * 2);
            ctx.lineWidth = 0.5;
            ctx.strokeStyle = 'rgba(100, 70, 10, 0.4)';
            ctx.stroke();
        }

        function drawText(text, cx, cy, r, angle, fontSize, color) {
            const rad = (angle - 90) * Math.PI / 180;
            const x = cx + r * Math.cos(rad);
            const y = cy + r * Math.sin(rad);
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate((angle) * Math.PI / 180);
            ctx.font = `bold ${fontSize}px 'Kalam', 'Noto Sans SC', cursive`;
            ctx.fillStyle = color;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 3;
            ctx.fillText(text, 0, 0);
            ctx.restore();
        }

        // 透明玻璃弹珠绘制
        function drawGlassBall(x, y, r, tint) {
            // tint: 'gold' 或 'clear'
            ctx.save();

            // 球的投影
            ctx.beginPath();
            ctx.ellipse(x + 2, y + 3, r * 1.0, r * 0.6, 0, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0,0,0,0.28)';
            ctx.fill();

            // 球体基色 — 半透明玻璃感，但足够可见
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            const baseGrad = ctx.createRadialGradient(
                x - r * 0.25, y - r * 0.25, r * 0.05,
                x, y, r
            );
            if (tint === 'gold') {
                // 金黄色玻璃弹珠，半透明但清晰可见
                baseGrad.addColorStop(0, 'rgba(255, 245, 200, 0.75)');
                baseGrad.addColorStop(0.35, 'rgba(255, 210, 80, 0.60)');
                baseGrad.addColorStop(0.65, 'rgba(200, 155, 30, 0.50)');
                baseGrad.addColorStop(0.85, 'rgba(160, 115, 20, 0.55)');
                baseGrad.addColorStop(1, 'rgba(110, 75, 10, 0.65)');
            } else {
                // 浅蓝/白色透明玻璃弹珠
                baseGrad.addColorStop(0, 'rgba(220, 235, 255, 0.70)');
                baseGrad.addColorStop(0.35, 'rgba(180, 205, 240, 0.55)');
                baseGrad.addColorStop(0.65, 'rgba(140, 165, 205, 0.45)');
                baseGrad.addColorStop(0.85, 'rgba(100, 125, 170, 0.52)');
                baseGrad.addColorStop(1, 'rgba(65,  90, 135, 0.60)');
            }
            ctx.fillStyle = baseGrad;
            ctx.fill();

            // 内部折射光效（模拟玻璃内部结构）
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            const causticGrad = ctx.createRadialGradient(
                x + r * 0.1, y + r * 0.2, 0,
                x + r * 0.1, y + r * 0.2, r * 0.65
            );
            if (tint === 'gold') {
                causticGrad.addColorStop(0, 'rgba(255, 235, 130, 0.50)');
                causticGrad.addColorStop(0.5, 'rgba(255, 200, 80, 0.20)');
                causticGrad.addColorStop(1, 'rgba(255, 170, 40, 0)');
            } else {
                causticGrad.addColorStop(0, 'rgba(210, 230, 255, 0.45)');
                causticGrad.addColorStop(0.5, 'rgba(180, 205, 245, 0.18)');
                causticGrad.addColorStop(1, 'rgba(150, 175, 220, 0)');
            }
            ctx.fillStyle = causticGrad;
            ctx.fill();

            // 玻璃弹珠内部装饰纹路（漩涡/花纹）
            ctx.save();
            ctx.beginPath();
            ctx.arc(x, y, r * 0.82, 0, Math.PI * 2);
            ctx.clip();
            if (tint === 'gold') {
                ctx.beginPath();
                ctx.arc(x - r * 0.08, y + r * 0.04, r * 0.32, 0, Math.PI * 1.6);
                ctx.lineWidth = r * 0.14;
                ctx.strokeStyle = 'rgba(255, 175, 45, 0.40)';
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(x + r * 0.12, y - r * 0.08, r * 0.18, 0.5, Math.PI * 1.7);
                ctx.lineWidth = r * 0.09;
                ctx.strokeStyle = 'rgba(255, 200, 80, 0.35)';
                ctx.stroke();
            } else {
                ctx.beginPath();
                ctx.arc(x - r * 0.05, y + r * 0.05, r * 0.28, 0, Math.PI * 1.5);
                ctx.lineWidth = r * 0.12;
                ctx.strokeStyle = 'rgba(100, 155, 230, 0.40)';
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(x + r * 0.1, y - r * 0.12, r * 0.16, 0.3, Math.PI * 1.5);
                ctx.lineWidth = r * 0.08;
                ctx.strokeStyle = 'rgba(130, 170, 240, 0.35)';
                ctx.stroke();
            }
            ctx.restore();

            // 玻璃外壳边缘折射（彩色边缘）
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.lineWidth = r * 0.13;
            ctx.strokeStyle = tint === 'gold'
                ? 'rgba(255, 215, 0, 0.40)'
                : 'rgba(180, 210, 255, 0.38)';
            ctx.stroke();

            // 主高光 - 左上角大亮斑
            ctx.beginPath();
            const hlGrad = ctx.createRadialGradient(
                x - r * 0.28, y - r * 0.28, 0,
                x - r * 0.28, y - r * 0.28, r * 0.52
            );
            hlGrad.addColorStop(0, 'rgba(255,255,255,0.98)');
            hlGrad.addColorStop(0.25, 'rgba(255,255,255,0.65)');
            hlGrad.addColorStop(0.6, 'rgba(255,255,255,0.15)');
            hlGrad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fillStyle = hlGrad;
            ctx.fill();

            // 次高光 - 右上小点
            ctx.beginPath();
            ctx.arc(x + r * 0.22, y - r * 0.30, r * 0.09, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.75)';
            ctx.fill();

            // 底部柔和反光
            ctx.beginPath();
            const bottomGrad = ctx.createRadialGradient(
                x + r * 0.08, y + r * 0.38, 0,
                x + r * 0.08, y + r * 0.38, r * 0.32
            );
            bottomGrad.addColorStop(0, 'rgba(255,255,255,0.22)');
            bottomGrad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fillStyle = bottomGrad;
            ctx.fill();

            // 最外层玻璃壳的微弱边线
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.lineWidth = 0.8;
            if (tint === 'gold') {
                ctx.strokeStyle = 'rgba(255, 215, 0, 0.35)';
            } else {
                ctx.strokeStyle = 'rgba(180, 200, 230, 0.3)';
            }
            ctx.stroke();

            // 外发光
            ctx.beginPath();
            ctx.arc(x, y, r + 1, 0, Math.PI * 2);
            if (tint === 'gold') {
                ctx.shadowColor = 'rgba(255, 215, 0, 0.3)';
            } else {
                ctx.shadowColor = 'rgba(180, 200, 255, 0.25)';
            }
            ctx.shadowBlur = 10;
            ctx.strokeStyle = 'transparent';
            ctx.lineWidth = 0;
            ctx.stroke();

            ctx.restore();
        }

        // ==================== 主绘制 ====================
        function draw() {
            ctx.clearRect(0, 0, CANVAS_CSS_SIZE, CANVAS_CSS_SIZE);

            // 背景圆
            ctx.beginPath();
            ctx.arc(CX, CY, R, 0, Math.PI * 2);
            const bgGrad = ctx.createRadialGradient(CX, CY, 0, CX, CY, R);
            bgGrad.addColorStop(0, '#2a2a4a');
            bgGrad.addColorStop(1, '#0f0f1f');
            ctx.fillStyle = bgGrad;
            ctx.fill();

            // === 外圈盘子 ===
            ctx.save();
            ctx.translate(CX, CY);
            ctx.rotate(state.outerAngle * Math.PI / 180);
            ctx.translate(-CX, -CY);

            const yunmuCount = yunmu.length;
            const yunmuDeg = 360 / yunmuCount;

            for (let i = 0; i < yunmuCount; i++) {
                const startA = i * yunmuDeg;
                const endA = (i + 1) * yunmuDeg;
                drawSector(CX, CY, OUTER_INNER_R, OUTER_R, startA, endA, OUTER_BG_COLORS[i % 2]);
            }

            if (state.lockedYunmuIdx !== null) {
                const i = state.lockedYunmuIdx;
                drawLockedGlow(CX, CY, OUTER_INNER_R, OUTER_R, i * yunmuDeg, (i + 1) * yunmuDeg);
            }

            for (let i = 0; i < yunmuCount; i++) {
                drawRail(CX, CY, OUTER_INNER_R - RAIL_WIDTH * 0.3, OUTER_R + RAIL_WIDTH * 0.3, i * yunmuDeg);
            }

            drawCircularRail(CX, CY, OUTER_R, RAIL_WIDTH * 1.2);
            drawCircularRail(CX, CY, OUTER_INNER_R, RAIL_WIDTH * 1.0);

            const yunmuTextR = (OUTER_R + OUTER_INNER_R) / 2;
            const yunmuFontSize = Math.max(10, R * 0.045);
            for (let i = 0; i < yunmuCount; i++) {
                drawText(yunmu[i], CX, CY, yunmuTextR, i * yunmuDeg + yunmuDeg / 2, yunmuFontSize, '#FFD700');
            }
            ctx.restore();

            // === 内圈盘子 ===
            ctx.save();
            ctx.translate(CX, CY);
            ctx.rotate(state.innerAngle * Math.PI / 180);
            ctx.translate(-CX, -CY);

            const shengmuCount = shengmu.length;
            const shengmuDeg = 360 / shengmuCount;

            ctx.beginPath();
            ctx.arc(CX, CY, INNER_R + RAIL_WIDTH, 0, Math.PI * 2);
            ctx.fillStyle = '#1a1a2e';
            ctx.fill();

            for (let i = 0; i < shengmuCount; i++) {
                const startA = i * shengmuDeg;
                const endA = (i + 1) * shengmuDeg;
                drawSector(CX, CY, INNER_INNER_R, INNER_R, startA, endA, INNER_BG_COLORS[i % 2]);
            }

            if (state.lockedShengmuIdx !== null) {
                const i = state.lockedShengmuIdx;
                drawLockedGlow(CX, CY, INNER_INNER_R, INNER_R, i * shengmuDeg, (i + 1) * shengmuDeg);
            }

            for (let i = 0; i < shengmuCount; i++) {
                drawRail(CX, CY, INNER_INNER_R - RAIL_WIDTH * 0.3, INNER_R + RAIL_WIDTH * 0.3, i * shengmuDeg);
            }

            drawCircularRail(CX, CY, INNER_R, RAIL_WIDTH * 1.0);
            drawCircularRail(CX, CY, INNER_INNER_R, RAIL_WIDTH * 0.9);

            const shengmuTextR = (INNER_R + INNER_INNER_R) / 2;
            const shengmuFontSize = Math.max(11, R * 0.05);
            for (let i = 0; i < shengmuCount; i++) {
                drawText(shengmu[i], CX, CY, shengmuTextR, i * shengmuDeg + shengmuDeg / 2, shengmuFontSize, '#FFFFFF');
            }
            ctx.restore();

            // === 中心装饰 ===
            ctx.beginPath();
            ctx.arc(CX, CY, CENTER_R, 0, Math.PI * 2);
            const centerGrad = ctx.createRadialGradient(CX - CENTER_R * 0.2, CY - CENTER_R * 0.2, 0, CX, CY, CENTER_R);
            centerGrad.addColorStop(0, '#3a2010');
            centerGrad.addColorStop(0.5, '#2a1508');
            centerGrad.addColorStop(1, '#1a0a04');
            ctx.fillStyle = centerGrad;
            ctx.fill();
            drawCircularRail(CX, CY, CENTER_R, RAIL_WIDTH * 0.8);

            ctx.save();
            ctx.font = `bold ${R * 0.06}px 'Noto Sans SC', sans-serif`;
            ctx.fillStyle = '#c9a85c';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 4;
            ctx.fillText('拼音', CX, CY - R * 0.03);
            ctx.font = `bold ${R * 0.04}px 'Noto Sans SC', sans-serif`;
            ctx.fillStyle = '#a88932';
            ctx.fillText('轮盘', CX, CY + R * 0.05);
            ctx.restore();

            // === 球 ===
            const outerBallAngle = state.outerAngle + state.outerBallOffset;
            const outerBallTrackR = OUTER_BALL_TRACK_R + state.outerBallRadialOffset;
            const outerBallRad = (outerBallAngle - 90) * Math.PI / 180;
            const outerBallX = CX + outerBallTrackR * Math.cos(outerBallRad);
            const outerBallY = CY + outerBallTrackR * Math.sin(outerBallRad);
            drawGlassBall(outerBallX, outerBallY, OUTER_BALL_R, 'gold');

            const innerBallAngle = state.innerAngle + state.innerBallOffset;
            const innerBallTrackR = INNER_BALL_TRACK_R + state.innerBallRadialOffset;
            const innerBallRad = (innerBallAngle - 90) * Math.PI / 180;
            const innerBallX = CX + innerBallTrackR * Math.cos(innerBallRad);
            const innerBallY = CY + innerBallTrackR * Math.sin(innerBallRad);
            drawGlassBall(innerBallX, innerBallY, INNER_BALL_R, 'clear');

            // === 指针线 ===
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(CX, CY - OUTER_R - RAIL_WIDTH * 2);
            ctx.lineTo(CX, CY - OUTER_INNER_R + RAIL_WIDTH);
            ctx.strokeStyle = 'rgba(255, 215, 0, 0.15)';
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.restore();
        }

        // ==================== 物理更新 ====================

        function update(now) {
            // idle 阶段：有导航目标时继续更新球的 lerp 动画
            if (state.phase === 'idle') {
                const hasNav = state.navigatingOuterTarget !== null || state.navigatingInnerTarget !== null;
                if (hasNav) {
                    console.log('[update] idle 阶段，调用 updateBallDrag，outerTarget:', state.navigatingOuterTarget, 'innerTarget:', state.navigatingInnerTarget);
                    updateBallDrag();
                }
                return;
            }

            const elapsed = now - state.spinStartTime;

            // === 加速阶段 ===
            if (state.phase === 'accelerating') {
                const t = Math.min(1, elapsed / state.accelDuration);
                // 使用 ease-in-out 缓动: smoothstep
                const eased = t * t * (3 - 2 * t);

                if (state.outerSpinning) {
                    state.outerVelocity = state.outerTargetVel * eased;
                    state.outerAngle += state.outerVelocity;
                }
                if (state.innerSpinning) {
                    state.innerVelocity = state.innerTargetVel * eased;
                    state.innerAngle += state.innerVelocity;
                }

                // 球跟随拖拽
                updateBallDrag();

                if (t >= 1) {
                    state.phase = 'cruising';
                }

                // 更新提示
                updateHintBar();
                return;
            }

            // === 匀速巡航阶段 ===
            if (state.phase === 'cruising') {
                if (state.outerSpinning) state.outerAngle += state.outerVelocity;
                if (state.innerSpinning) state.innerAngle += state.innerVelocity;

                updateBallDrag();

                // 自动停止检查（10秒）
                if (elapsed >= state.autoStopTime) {
                    beginDeceleration();
                }

                updateHintBar();
                return;
            }

            // === 减速阶段 ===
            if (state.phase === 'decelerating') {
                const friction = 0.985;
                state.outerVelocity *= friction;
                state.innerVelocity *= friction;
                if (state.outerSpinning) state.outerAngle += state.outerVelocity;
                if (state.innerSpinning) state.innerAngle += state.innerVelocity;

                updateBallDrag();

                const outerSpeed = Math.abs(state.outerVelocity);
                const innerSpeed = Math.abs(state.innerVelocity);

                // ── 减速末段：引导球朝向预定结果 ───────────────────────────
                // 当盘速慢下来时，引导球朝向 beginDeceleration 中锁定的目标格子
                if (outerSpeed < 5.0 && state.finalShengmuIdx !== undefined) {
                    const _od = 360 / yunmu.length;
                    const _id = 360 / shengmu.length;
                    const _on = ((state.outerBallOffset % 360) + 360) % 360;
                    const _in = ((state.innerBallOffset % 360) + 360) % 360;

                    let _oT = state.finalYunmuIdx * _od + _od * 0.5; // 居中
                    let _iT = state.finalShengmuIdx * _id + _id * 0.5; // 居中

                    // 短路修正
                    if (_oT - _on > 180) _oT -= 360; if (_oT - _on < -180) _oT += 360;
                    if (_iT - _in > 180) _iT -= 360; if (_iT - _in < -180) _iT += 360;

                    // 引导力随速度变慢而增强
                    const nudgeStrength = 0.015;
                    state.outerBallOffset = _on + (_oT - _on) * nudgeStrength;
                    state.innerBallOffset = _in + (_iT - _in) * nudgeStrength;
                }

                if (outerSpeed < 0.10 && innerSpeed < 0.10) {
                    state.outerVelocity = 0;
                    state.innerVelocity = 0;
                    state.phase = 'settling';
                    state.settleTimer = 60; // 约1秒

                    // 结果已在 beginDeceleration 时锁定，只需设置 lerp 终点
                    const _od = 360 / yunmu.length;
                    const _id = 360 / shengmu.length;
                    const _on = ((state.outerBallOffset % 360) + 360) % 360;
                    const _in = ((state.innerBallOffset % 360) + 360) % 360;

                    state.outerBallOffset = _on;
                    state.innerBallOffset = _in;
                    let outerTarget = state.finalYunmuIdx * _od + _od * 0.5;
                    let innerTarget = state.finalShengmuIdx * _id + _id * 0.5;
                    // 再次确保短路路径
                    if (outerTarget - _on > 180) outerTarget -= 360;
                    if (outerTarget - _on < -180) outerTarget += 360;
                    if (innerTarget - _in > 180) innerTarget -= 360;
                    if (innerTarget - _in < -180) innerTarget += 360;
                    state.outerSettleTarget = outerTarget;
                    state.innerSettleTarget = innerTarget;
                }

                updateHintBar();
                return;
            }

            // === settling 阶段：球逐渐向格子中心对齐 + 继续向外滑行 ===
            if (state.phase === 'settling') {
                const lerpK = 0.06;
                const slopeForce = 0.05;

                // ====== 外圈球 ======
                if (state.lockedYunmuIdx !== null) {
                    const _od = 360 / yunmu.length;
                    state.outerBallOffset = state.lockedYunmuIdx * _od + _od * 0.5;
                    state.outerBallRadialOffset = ((OUTER_R - OUTER_INNER_R) / 2 - OUTER_BALL_R) * 0.98;
                    state.outerBallRadialVel = 0;
                } else {
                    state.outerBallOffset += (state.outerSettleTarget - state.outerBallOffset) * lerpK;
                    state.outerBallRadialVel += 0.25 * slopeForce;
                    state.outerBallRadialOffset += state.outerBallRadialVel;
                    state.outerBallRadialVel *= 0.92;

                    const maxRO = ((OUTER_R - OUTER_INNER_R) / 2 - OUTER_BALL_R) * 0.98;
                    if (state.outerBallRadialOffset > maxRO) {
                        state.outerBallRadialOffset = maxRO;
                        state.outerBallRadialVel = -Math.abs(state.outerBallRadialVel) * 0.2;
                    }
                }

                // ====== 内圈球 ======
                if (state.lockedShengmuIdx !== null) {
                    const _id = 360 / shengmu.length;
                    state.innerBallOffset = state.lockedShengmuIdx * _id + _id * 0.5;
                    state.innerBallRadialOffset = ((INNER_R - INNER_INNER_R) / 2 - INNER_BALL_R) * 0.98;
                    state.innerBallRadialVel = 0;
                } else {
                    state.innerBallOffset += (state.innerSettleTarget - state.innerBallOffset) * lerpK;
                    state.innerBallRadialVel += 0.20 * slopeForce;
                    state.innerBallRadialOffset += state.innerBallRadialVel;
                    state.innerBallRadialVel *= 0.92;

                    const maxRI = ((INNER_R - INNER_INNER_R) / 2 - INNER_BALL_R) * 0.98;
                    if (state.innerBallRadialOffset > maxRI) {
                        state.innerBallRadialOffset = maxRI;
                        state.innerBallRadialVel = -Math.abs(state.innerBallRadialVel) * 0.2;
                    }
                }

                state.settleTimer--;
                if (state.settleTimer <= 0) {
                    state.phase = 'idle';
                    onSpinComplete();
                }
            }
        }

        // 确保球中心在格子内部（停止后调用）
        function pushBallsAwayFromBoundaries() {
            const outerDeg = 360 / yunmu.length;    // ≈0 10度
            const innerDeg = 360 / shengmu.length;  // ≈0 15.65度

            // 永远把球心放在靠近格子边缘的位置 (顺时针外圈 12%，逆时针内圈 88%)
            function centerInSector(offset, deg, frac) {
                const sector = Math.floor(offset / deg);
                const noise = (Math.random() - 0.5) * 0.04; // 增加微小随机性
                const newOffset = sector * deg + (frac + noise) * deg;
                return ((newOffset % 360) + 360) % 360;
            }

            state.outerBallOffset = centerInSector(state.outerBallOffset, outerDeg, 0.5);
            state.innerBallOffset = centerInSector(state.innerBallOffset, innerDeg, 0.5);
        }

        // 球跟随盘子的拖拽物理
        function updateBallDrag() {
            // 调试日志：每次调用都打印关键状态
            const outerDeg = 360 / yunmu.length;
            const innerDeg = 360 / shengmu.length;
            console.log('[updateBallDrag] phase:', state.phase,
                '| outerOffset:', state.outerBallOffset.toFixed(2),
                '| innerOffset:', state.innerBallOffset.toFixed(2),
                '| lockedSm:', state.lockedShengmuIdx, '| lockedYm:', state.lockedYunmuIdx,
                '| navOuter:', state.navigatingOuterTarget, '| navInner:', state.navigatingInnerTarget,
                '| outerSector:', Math.floor(((state.outerBallOffset % 360) + 360) % 360 / outerDeg),
                '| innerSector:', Math.floor(((state.innerBallOffset % 360) + 360) % 360 / innerDeg));

            const ballFriction = 0.990;
            const outerTrackHalf = (OUTER_R - OUTER_INNER_R) / 2 - OUTER_BALL_R;
            const innerTrackHalf = (INNER_R - INNER_INNER_R) / 2 - INNER_BALL_R;

            // 坡度重力参数 (模拟内高外低)
            const outerSlopeGravity = 0.25;
            const innerSlopeGravity = 0.20;

            // ====== 外圈球 ======
            if (state.navigatingOuterTarget !== null) {
                // 左右键导航：平滑 lerp 向目标扇区，方向跟随用户按的方向
                const lerpK = 0.18;
                const oldOffset = state.outerBallOffset;
                // 计算差值，方向跟随用户按的方向（1=顺时针, -1=逆时针）
                let diff = state.navigatingOuterTarget - state.outerBallOffset;
                // 标准化到 (-360, 360)
                while (diff > 180) diff -= 360;
                while (diff <= -180) diff += 360;
                // 如果差值方向与用户按的方向相反，说明需要绕圈，添加 360°
                if (state.navigatingOuterDir > 0 && diff < 0) diff += 360; // 顺时针但差值为负 → 绕正方向
                if (state.navigatingOuterDir < 0 && diff > 0) diff -= 360; // 逆时针但差值为正 → 绕负方向
                state.outerBallOffset += diff * lerpK;
                if (Math.abs(diff) < 0.15) {
                    state.outerBallOffset = state.navigatingOuterTarget;
                    state.navigatingOuterTarget = null;
                    state.navigatingOuterDir = 0;
                    console.log('[updateBallDrag] 外圈到达目标，停止');
                    // 到达目标后更新拼音并刷新面板
                    updateCurrentPinyinFromBalls(true);
                } else {
                    // 动画过程中只更新拼音，不刷新面板
                    updateCurrentPinyinFromBalls(false);
                }
                state.outerBallVelocity = 0;
                state.outerBallRadialVel = 0;
                state.outerBallRadialOffset = outerTrackHalf * 0.98;
                if (Math.floor(oldOffset / outerDeg) !== Math.floor(state.outerBallOffset / outerDeg)) {
                    console.log('[updateBallDrag] 外圈球滑动，old:', oldOffset.toFixed(2), 'new:', state.outerBallOffset.toFixed(2), 'target:', state.navigatingOuterTarget);
                }
            } else if (state.lockedYunmuIdx !== null) {
                const _od = 360 / yunmu.length;
                state.outerBallOffset = state.lockedYunmuIdx * _od + _od * 0.5;
                state.outerBallVelocity = 0;
                state.outerBallRadialVel = 0;
                state.outerBallRadialOffset = outerTrackHalf * 0.98;
            } else {
                const outerDrag = (state.outerVelocity - state.outerBallVelocity) * 0.05;
                state.outerBallVelocity += outerDrag;
                state.outerBallVelocity *= ballFriction;
                const outerRelVel = state.outerBallVelocity - state.outerVelocity;
                state.outerBallOffset += outerRelVel;

                const outerCentrifugal = state.outerVelocity * state.outerVelocity * 0.008;
                state.outerBallRadialVel += (outerCentrifugal + outerSlopeGravity) * 0.05;

                if (Math.abs(state.outerVelocity) > 0.5) {
                    state.outerBallRadialVel += (Math.random() - 0.5) * 0.25;
                    state.outerBallVelocity += (Math.random() - 0.5) * 0.08;
                }

                const outerDegPerSector = 360 / yunmu.length;
                const outerBallLocalAngle = ((state.outerBallOffset % 360) + 360) % 360;
                const currentOuterSector = Math.floor(outerBallLocalAngle / outerDegPerSector);
                if (lastOuterSector >= 0 && currentOuterSector !== lastOuterSector) {
                    const speed = Math.abs(state.outerVelocity);
                    const intensity = Math.min(1, speed / 6);
                    const dir = Math.random() < 0.6 ? 1 : -1;
                    state.outerBallRadialVel += intensity * (3.5 + Math.random() * 4) * dir;
                    state.outerBallVelocity += (Math.random() - 0.5) * intensity * 1.5;
                    if (speed > 0.6) playBounce(intensity * 0.45);
                }
                lastOuterSector = currentOuterSector;

                state.outerBallRadialOffset += state.outerBallRadialVel;
                state.outerBallRadialVel *= 0.96;

                const maxRO = outerTrackHalf * 0.98;
                if (state.outerBallRadialOffset > maxRO) {
                    state.outerBallRadialOffset = maxRO;
                    state.outerBallRadialVel = -Math.abs(state.outerBallRadialVel) * 0.2;
                    if (Math.abs(state.outerBallRadialVel) > 0.3) playBounce(0.12);
                } else if (state.outerBallRadialOffset < -maxRO) {
                    state.outerBallRadialOffset = -maxRO;
                    state.outerBallRadialVel = Math.abs(state.outerBallRadialVel) * 0.5;
                    if (Math.abs(state.outerBallRadialVel) > 0.3) playBounce(0.2);
                }
            }

            // ====== 内圈球 ======
            if (state.navigatingInnerTarget !== null) {
                const lerpK = 0.18;
                const oldOffset = state.innerBallOffset;
                // 计算差值，方向跟随用户按的方向（1=顺时针, -1=逆时针）
                let diff = state.navigatingInnerTarget - state.innerBallOffset;
                // 标准化到 (-360, 360)
                while (diff > 180) diff -= 360;
                while (diff <= -180) diff += 360;
                // 如果差值方向与用户按的方向相反，说明需要绕圈，添加 360°
                if (state.navigatingInnerDir > 0 && diff < 0) diff += 360; // 顺时针但差值为负 → 绕正方向
                if (state.navigatingInnerDir < 0 && diff > 0) diff -= 360; // 逆时针但差值为正 → 绕负方向
                state.innerBallOffset += diff * lerpK;
                if (Math.abs(diff) < 0.15) {
                    state.innerBallOffset = state.navigatingInnerTarget;
                    state.navigatingInnerTarget = null;
                    state.navigatingInnerDir = 0;
                    console.log('[updateBallDrag] 内圈到达目标，停止');
                    // 到达目标后更新拼音并刷新面板
                    updateCurrentPinyinFromBalls(true);
                } else {
                    // 动画过程中只更新拼音，不刷新面板
                    updateCurrentPinyinFromBalls(false);
                }
                state.innerBallVelocity = 0;
                state.innerBallRadialVel = 0;
                state.innerBallRadialOffset = innerTrackHalf * 0.98;
                if (Math.floor(oldOffset / innerDeg) !== Math.floor(state.innerBallOffset / innerDeg)) {
                    console.log('[updateBallDrag] 内圈球滑动，old:', oldOffset.toFixed(2), 'new:', state.innerBallOffset.toFixed(2), 'target:', state.navigatingInnerTarget);
                }
            } else if (state.lockedShengmuIdx !== null) {
                const _id = 360 / shengmu.length;
                state.innerBallOffset = state.lockedShengmuIdx * _id + _id * 0.5;
                state.innerBallVelocity = 0;
                state.innerBallRadialVel = 0;
                state.innerBallRadialOffset = innerTrackHalf * 0.98;
            } else {
                const innerDrag = (state.innerVelocity - state.innerBallVelocity) * 0.04;
                state.innerBallVelocity += innerDrag;
                state.innerBallVelocity *= ballFriction;
                const innerRelVel = state.innerBallVelocity - state.innerVelocity;
                state.innerBallOffset += innerRelVel;

                const innerCentrifugal = state.innerVelocity * state.innerVelocity * 0.006;
                state.innerBallRadialVel += (innerCentrifugal + innerSlopeGravity) * 0.05;

                if (Math.abs(state.innerVelocity) > 0.5) {
                    state.innerBallRadialVel += (Math.random() - 0.5) * 0.20;
                    state.innerBallVelocity += (Math.random() - 0.5) * 0.06;
                }

                const innerDegPerSector = 360 / shengmu.length;
                const innerBallLocalAngle = ((state.innerBallOffset % 360) + 360) % 360;
                const currentInnerSector = Math.floor(innerBallLocalAngle / innerDegPerSector);
                if (lastInnerSector >= 0 && currentInnerSector !== lastInnerSector) {
                    const speed = Math.abs(state.innerVelocity);
                    const intensity = Math.min(1, speed / 6);
                    const biasOut = speed > 3 ? 0.7 : 0.5;
                    const dir = Math.random() < biasOut ? 1 : -1;
                    state.innerBallRadialVel += intensity * (3 + Math.random() * 3.5) * dir;
                    state.innerBallVelocity += (Math.random() - 0.5) * intensity * 1.2;
                    if (speed > 0.6) playBounce(intensity * 0.45);
                }
                lastInnerSector = currentInnerSector;

                state.innerBallRadialOffset += state.innerBallRadialVel;
                state.innerBallRadialVel *= 0.96;

                const maxRI = innerTrackHalf * 0.98;
                if (state.innerBallRadialOffset > maxRI) {
                    state.innerBallRadialOffset = maxRI;
                    state.innerBallRadialVel = -Math.abs(state.innerBallRadialVel) * 0.2;
                    if (Math.abs(state.innerBallRadialVel) > 0.3) playBounce(0.12);
                } else if (state.innerBallRadialOffset < -maxRI) {
                    state.innerBallRadialOffset = -maxRI;
                    state.innerBallRadialVel = Math.abs(state.innerBallRadialVel) * 0.5;
                    if (Math.abs(state.innerBallRadialVel) > 0.3) playBounce(0.2);
                }
            }

            state.outerBallOffset = ((state.outerBallOffset % 360) + 360) % 360;
            state.innerBallOffset = ((state.innerBallOffset % 360) + 360) % 360;
        }

        // 最终对齐球到目标扇区（角度方向），保留径向自然位置
        function snapBallToTarget() {
            if (state.targetPinyin === null) return;

            const { shengmuIdx, yunmuIdx } = state.targetPinyin;

            // 外圈球对齐到目标韵母扇区 — 顺时针，靠后边缘 (12%)
            const outerDeg = 360 / yunmu.length;
            const targetOuterAngle = yunmuIdx * outerDeg + outerDeg * (0.5 + (Math.random() - 0.5) * 0.04);
            state.outerBallOffset = targetOuterAngle - state.outerAngle;

            // 内圈球对齐到目标声母扇区 — 居中 (0.5)
            const innerDeg = 360 / shengmu.length;
            const targetInnerAngle = shengmuIdx * innerDeg + innerDeg * (0.5 + (Math.random() - 0.5) * 0.04);
            state.innerBallOffset = targetInnerAngle - state.innerAngle;

            // 径向位置：停止时由于“内高外低”，强制滚到外侧
            const outerTrackHalf = (OUTER_R - OUTER_INNER_R) / 2 - OUTER_BALL_R;
            const innerTrackHalf = (INNER_R - INNER_INNER_R) / 2 - INNER_BALL_R;
            state.outerBallRadialOffset = outerTrackHalf * 0.98;
            state.innerBallRadialOffset = innerTrackHalf * 0.98;
        }

        // ==================== 游戏逻辑 ====================

        function startSpin() {
            if (state.phase !== 'idle') return;

            // 清除左右键导航状态
            state.navigatingOuterTarget = null;
            state.navigatingOuterDir = 0;
            state.navigatingInnerTarget = null;
            state.navigatingInnerDir = 0;

            // 隐藏音调面板
            document.getElementById('tonesPanel').classList.remove('show');

            playStartSound();
            state.phase = 'accelerating';
            state.spinStartTime = performance.now();

            // 设置速度和旋转标志
            state.outerVelocity = 0;
            state.innerVelocity = 0;
            state.outerSpinning = state.lockedYunmuIdx === null;
            state.innerSpinning = state.lockedShengmuIdx === null;

            // 如果某圈被锁定，目标最大速度为0
            state.outerTargetVel = state.outerSpinning ? (5 + Math.random() * 4) : 0;
            state.innerTargetVel = state.innerSpinning ? -(6 + Math.random() * 5) : 0;

            state.outerBallVelocity = 0;
            state.innerBallVelocity = 0;
            state.outerBallRadialVel = 0;
            state.innerBallRadialVel = 0;

            lastOuterSector = -1;
            lastInnerSector = -1;

            // 重置目标
            state.targetOuterAngle = null;
            state.targetInnerAngle = null;
            state.targetPinyin = null;

            // 隐藏结果
            document.getElementById('resultPinyin').classList.remove('show');

            // 物理归位：如果锁定了某圈，强制将球的位置同步到该索引
            if (state.lockedYunmuIdx !== null) {
                const _od = 360 / yunmu.length;
                state.outerBallOffset = state.lockedYunmuIdx * _od + _od * 0.5;
                state.outerBallRadialOffset = ((OUTER_R - OUTER_INNER_R) / 2 - OUTER_BALL_R) * 0.98;
            }
            if (state.lockedShengmuIdx !== null) {
                const _id = 360 / shengmu.length;
                state.innerBallOffset = state.lockedShengmuIdx * _id + _id * 0.5;
                state.innerBallRadialOffset = ((INNER_R - INNER_INNER_R) / 2 - INNER_BALL_R) * 0.98;
            }

            updateHintBar();
        }

        function beginDeceleration() {
            if (state.phase !== 'cruising' && state.phase !== 'accelerating') return;

            state.phase = 'decelerating';

            // ── 立即锁定并预测最终结果 ──────────────────────────────────────────
            const _od = 360 / yunmu.length;
            const _id = 360 / shengmu.length;
            const _on = ((state.outerBallOffset % 360) + 360) % 360;
            const _in = ((state.innerBallOffset % 360) + 360) % 360;

            // 1. 获取物理位置对应的索引
            let _fsi = Math.floor(_in / _id);
            _fsi = ((_fsi % shengmu.length) + shengmu.length) % shengmu.length;
            let _fyi = Math.floor(_on / _od);
            _fyi = ((_fyi % yunmu.length) + yunmu.length) % yunmu.length;

            // 2. 尊重锁定（最高优先级，直接覆盖物理推导）
            if (state.lockedShengmuIdx !== null) _fsi = state.lockedShengmuIdx;
            if (state.lockedYunmuIdx !== null) _fyi = state.lockedYunmuIdx;

            // 3. 寻找最近的合法组合
            // 如果两个都锁定了，我们就无需寻找，直接显示结果（即便不合法）
            const bothLocked = (state.lockedShengmuIdx !== null && state.lockedYunmuIdx !== null);
            const _valid = validPinyinMap[_fsi] && validPinyinMap[_fsi].includes(_fyi);

            if (!_valid && !bothLocked) {
                let _bestDist = Infinity;
                let _bestSi = _fsi;
                let _bestYi = _fyi;

                if (state.lockedYunmuIdx !== null) {
                    // 韵母锁定：只需寻找离当前声母物理位置最近的有效声母
                    for (const [siStr, opts] of Object.entries(validPinyinMap)) {
                        if (opts.includes(state.lockedYunmuIdx)) {
                            const si = parseInt(siStr);
                            const ic = si * _id + _id * 0.5;
                            let di = Math.abs(_in - ic); if (di > 180) di = 360 - di;
                            if (di < _bestDist) { _bestDist = di; _bestSi = si; }
                        }
                    }
                } else if (state.lockedShengmuIdx !== null) {
                    // 声母锁定：只需寻找离当前韵母物理位置最近的有效韵母
                    const opts = validPinyinMap[state.lockedShengmuIdx] || [];
                    for (const yi of opts) {
                        const oc = yi * _od + _od * 0.5;
                        let dO = Math.abs(_on - oc); if (dO > 180) dO = 360 - dO;
                        if (dO < _bestDist) { _bestDist = dO; _bestYi = yi; }
                    }
                } else {
                    // 均未锁定：寻找最近的整体有效组合
                    for (const [siStr, opts] of Object.entries(validPinyinMap)) {
                        const si = parseInt(siStr);
                        const ic = si * _id + _id * 0.5;
                        let di = Math.abs(_in - ic); if (di > 180) di = 360 - di;
                        for (const yi of opts) {
                            const oc = yi * _od + _od * 0.5;
                            let dO = Math.abs(_on - oc); if (dO > 180) dO = 360 - dO;
                            if (di + dO < _bestDist) { _bestDist = di + dO; _bestSi = si; _bestYi = yi; }
                        }
                    }
                }

                // 应用找到的最优解
                _fsi = _bestSi;
                _fyi = _bestYi;
            }

            // 安全检查
            _fsi = Math.max(0, Math.min(shengmu.length - 1, Math.floor(Number(_fsi) || 0)));
            _fyi = Math.max(0, Math.min(yunmu.length - 1, Math.floor(Number(_fyi) || 0)));

            // 4. 最终强制同步（多重保险）：如果有锁定，结算索引必须等于锁定索引
            if (state.lockedShengmuIdx !== null) _fsi = state.lockedShengmuIdx;
            if (state.lockedYunmuIdx !== null) _fyi = state.lockedYunmuIdx;

            state.finalShengmuIdx = _fsi;
            state.finalYunmuIdx = _fyi;

            // 立即以红色显示预测结果
            const s = shengmu[state.finalShengmuIdx] || '';
            const y = yunmu[state.finalYunmuIdx] || '';
            let pinyin = s + y;
            if (s && (s === 'j' || s === 'q' || s === 'x' || s === 'y')) {
                if (y.startsWith('ü')) pinyin = s + 'u' + y.slice(1);
            }
            const resultEl = document.getElementById('resultPinyin');
            resultEl.textContent = pinyin || '--';
            resultEl.style.color = '#FF4D4D'; // 红色表示已锁定，正在减速

            updateHintBar();
        }

        function updateHintBar() {
            const hint = document.getElementById('hintBar');
            if (state.phase === 'accelerating' || state.phase === 'cruising') {
                hint.textContent = '再按 空格键 停止';
                hint.style.animation = 'none';
                hint.style.opacity = '0.6';
            } else if (state.phase === 'decelerating' || state.phase === 'settling') {
                hint.textContent = '正在停止...';
                hint.style.animation = 'none';
                hint.style.opacity = '0.4';
            } else {
                hint.textContent = '按 空格键 旋转轮盘 | 回车键 查看音调';
                hint.style.animation = 'pulse 2s ease-in-out infinite';
                hint.style.opacity = '';
            }
        }

        function onSpinComplete() {
            playStopSound();

            // 结果强制校准：如果锁定了，结果必须是锁定的那个
            if (state.lockedShengmuIdx !== null) state.finalShengmuIdx = state.lockedShengmuIdx;
            if (state.lockedYunmuIdx !== null) state.finalYunmuIdx = state.lockedYunmuIdx;

            const s = shengmu[state.finalShengmuIdx] || '';
            const y = yunmu[state.finalYunmuIdx] || '';
            let pinyin = s + y;
            // j/q/x/y + ü 系韵母 → 标准拼音写法（省略两点）
            if (s && (s === 'j' || s === 'q' || s === 'x' || s === 'y')) {
                if (y.startsWith('ü')) pinyin = s + 'u' + y.slice(1);
            }

            const resultEl = document.getElementById('resultPinyin');
            // textContent 已在 settling 开始时设置，这里只需变色
            resultEl.style.color = '#FFD700'; // 金色表示最终确认结果
            resultEl.classList.add('show');
            playWinSound();

            updateHintBar();
        }

        // ==================== 主循环 ====================
        function gameLoop(timestamp) {
            const loopCount = (gameLoop._count = (gameLoop._count || 0) + 1);
            if (loopCount <= 3) {
                console.log('[gameLoop] frame', loopCount, 'phase:', state.phase,
                    'navOuter:', state.navigatingOuterTarget, 'navInner:', state.navigatingInnerTarget);
            }
            update(timestamp);
            draw();
            animFrameId = requestAnimationFrame(gameLoop);
        }

        // ==================== 事件 ====================
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (state.phase === 'idle') {
                    startSpin();
                } else if (state.phase === 'accelerating' || state.phase === 'cruising') {
                    beginDeceleration();
                }
            } else if (e.code === 'Enter') {
                if (state.phase === 'idle') {
                    if (updateCurrentPinyinFromBalls()) {
                        showTonesPanel();
                    }
                }
            } else if (e.code === 'Escape') {
                // ESC 键关闭音调面板
                const tonesPanel = document.getElementById('tonesPanel');
                if (tonesPanel.classList.contains('show')) {
                    tonesPanel.classList.remove('show');
                }
            } else if (e.code === 'ArrowLeft' || e.code === 'ArrowRight') {
                e.preventDefault();
                if (state.phase === 'idle') {
                    console.log('=== Arrow key pressed ===');
                    console.log('phase:', state.phase);
                    console.log('lockedShengmuIdx:', state.lockedShengmuIdx);
                    console.log('lockedYunmuIdx:', state.lockedYunmuIdx);
                    console.log('innerBallOffset:', state.innerBallOffset);
                    console.log('outerBallOffset:', state.outerBallOffset);
                    console.log('navigatingOuterTarget:', state.navigatingOuterTarget);
                    console.log('navigatingInnerTarget:', state.navigatingInnerTarget);
                    const dir = e.code === 'ArrowRight' ? 1 : -1;
                    navigateBall(dir);
                }
            }
        });

        // 跟踪每个带调拼音已显示过的字符索引，全部显示完则重置
        const shownCharsMap = new Map();

        // 根据当前球位置（及锁定状态）计算拼音并显示，返回是否有效
        // updatePanel: 是否同步更新右侧音调面板（动画 lerp 过程中传 false）
        function updateCurrentPinyinFromBalls(updatePanel = true) {
            const outerDeg = 360 / yunmu.length;
            const innerDeg = 360 / shengmu.length;

            // 从球的 offset 计算所在扇区索引
            let si = Math.floor(state.innerBallOffset / innerDeg);
            let yi = Math.floor(state.outerBallOffset / outerDeg);
            si = Math.max(0, Math.min(shengmu.length - 1, si));
            yi = Math.max(0, Math.min(yunmu.length - 1, yi));

            // 若有锁定，优先使用锁定值
            if (state.lockedShengmuIdx !== null) si = state.lockedShengmuIdx;
            if (state.lockedYunmuIdx !== null) yi = state.lockedYunmuIdx;

            const s = shengmu[si] || '';
            const y = yunmu[yi] || '';
            const key = s + y;

            const resultEl = document.getElementById('resultPinyin');
            if (validPinyinSet.has(key)) {
                state.finalShengmuIdx = si;
                state.finalYunmuIdx = yi;
                let pinyin = s + y;
                // j/q/x/y + ü 系韵母 → 标准拼音写法（省略两点）
                if (s && (s === 'j' || s === 'q' || s === 'x' || s === 'y')) {
                    if (y.startsWith('ü')) pinyin = s + 'u' + y.slice(1);
                }
                resultEl.textContent = pinyin;
                resultEl.style.color = '#FFD700';
                resultEl.classList.add('show');

                // 若音调面板已打开，同步刷新内容（拼音变化时即更新）
                if (updatePanel && document.getElementById('tonesPanel').classList.contains('show')) {
                    updateTonesPanelContent();
                }

                return true;
            } else {
                resultEl.classList.remove('show');
                return false;
            }
        }

        // 左右键平滑导航：声母锁定时移动韵母球，韵母锁定时移动声母球
        function navigateBall(dir) {
            console.log('[navigateBall] called, dir:', dir);
            const outerDeg = 360 / yunmu.length;
            const innerDeg = 360 / shengmu.length;

            if (state.lockedShengmuIdx !== null && state.lockedYunmuIdx === null) {
                // 声母锁定 → 移动韵母球
                console.log('[navigateBall] 声母锁定模式，lockedShengmuIdx:', state.lockedShengmuIdx);
                const si = state.lockedShengmuIdx;
                const validYunmuArr = validPinyinMap[si] || [];
                console.log('[navigateBall] validYunmuArr for si', si, ':', validYunmuArr);
                if (validYunmuArr.length === 0) {
                    console.log('[navigateBall] validYunmuArr 为空，直接返回');
                    return;
                }

                const curYi = Math.floor(((state.outerBallOffset % 360) + 360) % 360 / outerDeg);
                console.log('[navigateBall] curYi:', curYi, '(from outerBallOffset:', state.outerBallOffset, ')');
                const step = dir > 0 ? 1 : -1;
                let nextYi = (curYi + step + yunmu.length) % yunmu.length;
                let attempts = 0;
                while (!validYunmuArr.includes(nextYi) && attempts < yunmu.length) {
                    nextYi = (nextYi + step + yunmu.length) % yunmu.length;
                    attempts++;
                }
                console.log('[navigateBall] 最终 nextYi:', nextYi, 'attempts:', attempts);
                if (!validYunmuArr.includes(nextYi)) {
                    console.log('[navigateBall] 未找到有效韵母，返回');
                    return;
                }

                // 如果目标就是当前格子，不需要移动，直接更新面板
                if (nextYi === curYi) {
                    console.log('[navigateBall] 目标韵母就是当前格子，直接更新面板');
                    updateCurrentPinyinFromBalls(true);
                    return;
                }

                state.navigatingOuterTarget = nextYi * outerDeg + outerDeg * 0.5;
                state.navigatingOuterDir = dir; // 1=顺时针, -1=逆时针
                console.log('[navigateBall] 设置 navigatingOuterTarget:', state.navigatingOuterTarget, 'dir:', dir);
                const trackHalf = (OUTER_R - OUTER_INNER_R) / 2 - OUTER_BALL_R;
                state.outerBallRadialOffset = trackHalf * 0.98;
                playTick(700, 0.06, 0.03);
                updateCurrentPinyinFromBalls(true); // 停止后允许面板更新（动画过程中会被 isNavigating 拦住）

            } else if (state.lockedYunmuIdx !== null && state.lockedShengmuIdx === null) {
                // 韵母锁定 → 移动声母球
                console.log('[navigateBall] 韵母锁定模式，lockedYunmuIdx:', state.lockedYunmuIdx);
                const yi = state.lockedYunmuIdx;
                const validShengmuArr = [];
                for (const [siStr, yArr] of Object.entries(validPinyinMap)) {
                    if (yArr.includes(yi)) validShengmuArr.push(parseInt(siStr));
                }
                console.log('[navigateBall] validShengmuArr for yi', yi, ':', validShengmuArr);
                if (validShengmuArr.length === 0) {
                    console.log('[navigateBall] validShengmuArr 为空，直接返回');
                    return;
                }

                const curSi = Math.floor(((state.innerBallOffset % 360) + 360) % 360 / innerDeg);
                console.log('[navigateBall] curSi:', curSi, '(from innerBallOffset:', state.innerBallOffset, ')');
                const step = dir > 0 ? 1 : -1;
                let nextSi = (curSi + step + shengmu.length) % shengmu.length;
                let attempts = 0;
                while (!validShengmuArr.includes(nextSi) && attempts < shengmu.length) {
                    nextSi = (nextSi + step + shengmu.length) % shengmu.length;
                    attempts++;
                }
                console.log('[navigateBall] 最终 nextSi:', nextSi, 'attempts:', attempts);
                if (!validShengmuArr.includes(nextSi)) {
                    console.log('[navigateBall] 未找到有效声母，返回');
                    return;
                }

                // 如果目标就是当前格子，不需要移动，直接更新面板
                if (nextSi === curSi) {
                    console.log('[navigateBall] 目标声母就是当前格子，直接更新面板');
                    updateCurrentPinyinFromBalls(true);
                    return;
                }

                state.navigatingInnerTarget = nextSi * innerDeg + innerDeg * 0.5;
                state.navigatingInnerDir = dir; // 1=顺时针, -1=逆时针
                console.log('[navigateBall] 设置 navigatingInnerTarget:', state.navigatingInnerTarget, 'dir:', dir);
                const trackHalf = (INNER_R - INNER_INNER_R) / 2 - INNER_BALL_R;
                state.innerBallRadialOffset = trackHalf * 0.98;
                playTick(500, 0.06, 0.03);
                updateCurrentPinyinFromBalls(true); // 停止后允许面板更新（动画过程中会被 isNavigating 拦住）
            } else {
                console.log('[navigateBall] 未满足条件，两个都不锁定或两个都锁定了，跳过');
                console.log('  lockedShengmuIdx:', state.lockedShengmuIdx, 'lockedYunmuIdx:', state.lockedYunmuIdx);
            }
        }

        function updateTonesPanelContent() {
            const s = shengmu[state.finalShengmuIdx] || '';
            const y = yunmu[state.finalYunmuIdx] || '';
            let base = s + y;

            const list = document.getElementById('tonesList');
            const title = document.getElementById('panelTitle');

            title.textContent = `拼音 ${base} 的常用字`;
            list.innerHTML = '';

            for (let i = 1; i <= 4; i++) {
                const tonedKey = markPinyin(base, i);
                const chars = pinyinData[tonedKey] || [];

                // 如果该音调没有对应的常用字，则不显示
                if (chars.length === 0) continue;

                // 在未显示过的字符中随机选择，全部用完则重置记录
                let shownSet = shownCharsMap.get(tonedKey);
                if (!shownSet) {
                    shownSet = new Set();
                    shownCharsMap.set(tonedKey, shownSet);
                }

                const remainingIdx = chars
                    .map((_, idx) => idx)
                    .filter(idx => !shownSet.has(idx));

                if (remainingIdx.length === 0) {
                    shownSet.clear();
                    remainingIdx.push(...chars.map((_, idx) => idx));
                }

                const pickIdx = remainingIdx[Math.floor(Math.random() * remainingIdx.length)];
                shownSet.add(pickIdx);
                const char = chars[pickIdx];

                const item = document.createElement('div');
                item.className = 'tone-item';
                item.innerHTML = `
                    <span class="toned-pinyin">${tonedKey}</span>
                    <span class="sample-char">${char}</span>
                `;

                item.onclick = () => {
                    speak(char);
                };
                list.appendChild(item);
            }
        }

        function showTonesPanel() {
            updateTonesPanelContent();
            document.getElementById('tonesPanel').classList.add('show');
        }

        function speak(text) {
            if (!window.speechSynthesis) return;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            utterance.rate = 0.8;
            speechSynthesis.speak(utterance);
        }

        canvas.addEventListener('click', (e) => {
            if (state.phase === 'idle') {
                // 点击以锁定/解锁
                const rect = canvas.getBoundingClientRect();
                const mouseX = (e.clientX - rect.left) * (CANVAS_CSS_SIZE / rect.width);
                const mouseY = (e.clientY - rect.top) * (CANVAS_CSS_SIZE / rect.height);

                const dx = mouseX - CX;
                const dy = mouseY - CY;
                const dist = Math.sqrt(dx * dx + dy * dy);

                // 计算点击的角度 (0-360)
                let angle = Math.atan2(dy, dx) * 180 / Math.PI + 90;
                angle = (angle + 360) % 360;

                // 判断点击的是哪一圈
                if (dist >= OUTER_INNER_R && dist <= OUTER_R) {
                    // 外圈 (韵母)
                    const localAngle = (angle - state.outerAngle + 360) % 360;
                    const yunmuDeg = 360 / yunmu.length;
                    const idx = Math.min(yunmu.length - 1, Math.floor(localAngle / yunmuDeg));

                    if (state.lockedYunmuIdx === idx) {
                        state.lockedYunmuIdx = null;
                    } else {
                        state.lockedYunmuIdx = idx;
                        state.lockedShengmuIdx = null; // 互斥锁定
                        state.navigatingInnerTarget = null; // 清除声母球的导航目标
                        state.navigatingInnerDir = 0;

                        // 立即视觉同步：锁定即居中
                        state.outerBallOffset = idx * yunmuDeg + yunmuDeg * 0.5;
                        state.outerBallRadialOffset = ((OUTER_R - OUTER_INNER_R) / 2 - OUTER_BALL_R) * 0.98;
                        state.outerBallVelocity = 0;
                        state.outerBallRadialVel = 0;

                        // 同步内圈球到当前韵母的有效声母格（避免 navigateBall 从错误位置开始）
                        const validShengmuArr = [];
                        for (const [siStr, yArr] of Object.entries(validPinyinMap)) {
                            if (yArr.includes(idx)) validShengmuArr.push(parseInt(siStr));
                        }
                        if (validShengmuArr.length > 0) {
                            const shengmuDeg = 360 / shengmu.length;
                            const curInnerSi = Math.floor(((state.innerBallOffset % 360) + 360) % 360 / shengmuDeg);
                            const nearestSi = validShengmuArr.includes(curInnerSi)
                                ? curInnerSi
                                : validShengmuArr[0];
                            state.innerBallOffset = (nearestSi + 0.5) * shengmuDeg;
                            state.innerBallRadialOffset = ((INNER_R - INNER_INNER_R) / 2 - INNER_BALL_R) * 0.98;
                            state.innerBallVelocity = 0;
                            state.innerBallRadialVel = 0;
                        }
                    }
                    playTick(600, 0.1, 0.05);
                    updateCurrentPinyinFromBalls();
                } else if (dist >= INNER_INNER_R && dist <= INNER_R) {
                    // 内圈 (声母)
                    const localAngle = (angle - state.innerAngle + 360) % 360;
                    const shengmuDeg = 360 / shengmu.length;
                    const idx = Math.min(shengmu.length - 1, Math.floor(localAngle / shengmuDeg));

                    if (state.lockedShengmuIdx === idx) {
                        state.lockedShengmuIdx = null;
                    } else {
                        state.lockedShengmuIdx = idx;
                        state.lockedYunmuIdx = null; // 互斥锁定
                        state.navigatingOuterTarget = null; // 清除韵母球的导航目标
                        state.navigatingOuterDir = 0;

                        // 立即视觉同步：锁定即居中
                        state.innerBallOffset = idx * shengmuDeg + shengmuDeg * 0.5;
                        state.innerBallRadialOffset = ((INNER_R - INNER_INNER_R) / 2 - INNER_BALL_R) * 0.98;
                        state.innerBallVelocity = 0;
                        state.innerBallRadialVel = 0;

                        // 同步外圈球到当前声母的有效韵母格（避免 navigateBall 从错误位置开始）
                        const validYunmuArr = validPinyinMap[idx] || [];
                        if (validYunmuArr.length > 0) {
                            const yunmuDeg = 360 / yunmu.length;
                            // 优先用当前外圈球所在的格子（如果有效），否则选第一个有效韵母
                            const curOuterYi = Math.floor(((state.outerBallOffset % 360) + 360) % 360 / yunmuDeg);
                            const nearestYi = validYunmuArr.includes(curOuterYi)
                                ? curOuterYi
                                : validYunmuArr[0];
                            state.outerBallOffset = (nearestYi + 0.5) * yunmuDeg;
                            state.outerBallRadialOffset = ((OUTER_R - OUTER_INNER_R) / 2 - OUTER_BALL_R) * 0.98;
                            state.outerBallVelocity = 0;
                            state.outerBallRadialVel = 0;
                        }
                    }
                    playTick(800, 0.1, 0.05);
                    updateCurrentPinyinFromBalls();
                } else {
                    // 点击中心区域或空白区域，开始旋转
                    startSpin();
                }
            } else if (state.phase === 'accelerating' || state.phase === 'cruising') {
                beginDeceleration();
            }
        });

        window.addEventListener('resize', () => {
            location.reload();
        });

        // ==================== 初始化 ====================
        // 球加载到随机格子的内部（20%-80%底部），不落在边界线上
        (function initBalls() {
            const outerDeg = 360 / yunmu.length;
            const innerDeg = 360 / shengmu.length;
            // 外圈球：随机选一个韵母格，球心在格内的中心 (0.5)
            const outerSector = Math.floor(Math.random() * yunmu.length);
            state.outerBallOffset = (outerSector + 0.5 + (Math.random() - 0.5) * 0.04) * outerDeg;
            // 内圈球：随机选一个声母格，球心在格内的中心 (0.5)
            const innerSector = Math.floor(Math.random() * shengmu.length);
            state.innerBallOffset = (innerSector + 0.5 + (Math.random() - 0.5) * 0.04) * innerDeg;

            // 径向位置：默认滚向外侧
            const initOuterTrackHalf = (OUTER_R - OUTER_INNER_R) / 2 - OUTER_BALL_R;
            const initInnerTrackHalf = (INNER_R - INNER_INNER_R) / 2 - INNER_BALL_R;
            state.outerBallRadialOffset = initOuterTrackHalf * 0.98;
            state.innerBallRadialOffset = initInnerTrackHalf * 0.98;
        })()
        updateCurrentPinyinFromBalls();
        animFrameId = requestAnimationFrame(gameLoop);
    </script>
</body>
