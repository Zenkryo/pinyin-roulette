<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拼音学习轮盘</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&family=Kalam:wght@700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 30% 20%, rgba(50, 50, 100, 0.4) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(80, 40, 60, 0.3) 0%, transparent 60%);
            pointer-events: none;
        }

        .game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            margin-bottom: 80px;
            /* 轮盘整体上移，为下方拼音显示空出空间 */
        }

        canvas {
            display: block;
            border-radius: 50%;
            box-shadow:
                0 0 60px rgba(0, 0, 0, 0.5),
                0 0 120px rgba(0, 0, 0, 0.3);
        }

        .result-display {
            position: absolute;
            bottom: -90px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #fff;
            min-width: 300px;
        }

        .result-display .pinyin {
            font-family: 'Kalam', 'Noto Sans SC', cursive;
            font-size: 52px;
            font-weight: 700;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
            color: #FFD700;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .result-display .pinyin.show {
            opacity: 1;
            transform: scale(1);
        }

        .hint-bar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.35);
            font-size: 14px;
            letter-spacing: 2px;
            animation: pulse 2s ease-in-out infinite;
            transition: opacity 0.3s;
        }

        /* 打开成语练习的按钮 */
        .quiz-toggle-btn {
            position: fixed;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            width: 48px;
            height: 48px;
            background: rgba(255, 215, 0, 0.9);
            border: none;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
            transition: all 0.3s;
            z-index: 100;
        }

        .quiz-toggle-btn:hover {
            transform: translateY(-50%) scale(1.1);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.5);
        }

        /* 左侧成语练习面板 */
        .quiz-panel {
            position: fixed;
            left: -350px;
            top: 0;
            width: 340px;
            height: 100vh;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            box-shadow: 4px 0 30px rgba(0, 0, 0, 0.5);
            transition: left 0.3s ease;
            z-index: 150;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .quiz-panel.active {
            left: 0;
        }

        .quiz-panel-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .quiz-panel-title {
            font-size: 20px;
            color: #FFD700;
            font-weight: 700;
        }

        .quiz-panel-close {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 24px;
            cursor: pointer;
            padding: 5px 10px;
            transition: color 0.3s;
        }

        .quiz-panel-close:hover {
            color: #fff;
        }

        .quiz-panel-hint {
            padding: 10px 20px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .quiz-content {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
        }

        .quiz-chengyu {
            font-size: 42px;
            color: #fff;
            margin: 20px 0;
            letter-spacing: 8px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .quiz-question-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-bottom: 15px;
        }

        .quiz-pinyin-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            margin-bottom: 20px;
        }

        .quiz-pinyin-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            padding: 12px 8px;
            font-size: 18px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Kalam', cursive;
        }

        .quiz-pinyin-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 215, 0, 0.5);
            transform: translateY(-2px);
        }

        .quiz-pinyin-btn.correct {
            border-color: #4CAF50;
            background: rgba(76, 175, 80, 0.3);
            color: #fff;
        }

        .quiz-pinyin-btn.wrong {
            border-color: #f44336;
            background: rgba(244, 67, 54, 0.3);
            color: rgba(255, 255, 255, 0.5);
        }

        .quiz-pinyin-btn:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .quiz-answer-display {
            width: 100%;
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid rgba(76, 175, 80, 0.3);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            display: none;
        }

        .quiz-answer-display.show {
            display: block;
        }

        .quiz-answer-pinyin {
            font-family: 'Kalam', cursive;
            font-size: 28px;
            color: #4CAF50;
            margin-bottom: 8px;
        }

        .quiz-answer-hanzi {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.8);
        }

        .quiz-next-btn {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            border: none;
            color: #1a1a2e;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .quiz-next-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3);
        }

        .quiz-feedback {
            font-size: 16px;
            margin-top: 15px;
            min-height: 24px;
        }

        .quiz-feedback.correct {
            color: #4CAF50;
        }

        .quiz-feedback.wrong {
            color: #f44336;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.35;
            }

            50% {
                opacity: 0.7;
            }
        }

        .pointer-mark {
            position: absolute;
            top: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 18px solid #FFD700;
            filter: drop-shadow(0 0 6px rgba(255, 215, 0, 0.6));
            z-index: 10;
        }

        /* 音调面板样式 */
        .tones-panel {
            position: fixed;
            right: -320px;
            /* 初始隐藏 */
            top: 20px;
            bottom: 20px;
            width: 280px;
            background: rgba(26, 26, 46, 0.85);
            backdrop-filter: blur(15px);
            border-left: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 24px 0 0 24px;
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.5);
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 100;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .tones-panel.show {
            right: 0;
        }

        .tones-panel-title {
            color: #FFD700;
            font-size: 18px;
            font-weight: bold;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
            padding-bottom: 10px;
            text-align: center;
        }

        .tone-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tone-item:hover {
            background: rgba(255, 215, 0, 0.15);
            border-color: #FFD700;
            transform: translateX(-5px);
        }

        .toned-pinyin {
            color: #FFFFFF;
            font-size: 20px;
            font-family: 'Times New Roman', serif;
        }

        .sample-char {
            color: #FFD700;
            font-size: 24px;
            font-weight: bold;
        }

        .tone-hint {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            text-align: center;
            margin-top: auto;
        }
    </style>
</head>

<body>

    <div class="game-container" id="gameContainer">
        <div class="pointer-mark"></div>
        <canvas id="wheelCanvas"></canvas>
        <div class="result-display">
            <div class="pinyin" id="resultPinyin"></div>
        </div>
    </div>

    <div class="tones-panel" id="tonesPanel">
        <div class="tones-panel-title" id="panelTitle">拼音释义</div>
        <div id="tonesList"></div>
        <div class="tone-hint">点击项目朗读发音</div>
    </div>

    <div class="hint-bar" id="hintBar">按 空格键 旋转轮盘</div>

    <!-- 打开成语练习面板的按钮 -->
    <button class="quiz-toggle-btn" onclick="toggleQuizPanel()" title="成语练习 (Ctrl+Shift+空格)">📝</button>

    <!-- 左侧成语练习面板 -->
    <div class="quiz-panel" id="quizPanel">
        <div class="quiz-panel-header">
            <span class="quiz-panel-title">成语练习</span>
            <button class="quiz-panel-close" onclick="toggleQuizPanel()">&times;</button>
        </div>
        <div class="quiz-panel-hint">按 Ctrl+Shift+空格 或点击左侧按钮</div>
        <div class="quiz-content">
            <div class="quiz-question-label">这个成语的拼音是什么？</div>
            <div class="quiz-chengyu" id="quizChengyu">-</div>
            <div class="quiz-pinyin-options" id="quizPinyinOptions"></div>
            <div class="quiz-feedback" id="quizFeedback"></div>
            <div class="quiz-answer-display" id="quizAnswerDisplay">
                <div class="quiz-answer-pinyin" id="quizAnswerPinyin"></div>
                <div class="quiz-answer-hanzi" id="quizAnswerHanzi"></div>
            </div>
            <button class="quiz-next-btn" id="quizNextBtn" onclick="loadNewQuestion()">下一题</button>
        </div>
    </div>

        const toneChars = {
            'a': ['ā', 'á', 'ǎ', 'à'], 'o': ['ō', 'ó', 'ǒ', 'ò'], 'e': ['ē', 'é', 'ě', 'è'],

        function markPinyin(base, tone) {
            if (tone < 1 || tone > 4) return base;
            const idx = tone - 1;
            let res = base.replace('ü', 'v');
            if (res.includes('a')) res = res.replace('a', toneChars['a'][idx]);
            else if (res.includes('o')) res = res.replace('o', toneChars['o'][idx]);
            else if (res.includes('e')) res = res.replace('e', toneChars['e'][idx]);
            else if (res.includes('iu')) res = res.replace('u', toneChars['u'][idx]);
            else if (res.includes('ui')) res = res.replace('i', toneChars['i'][idx]);
            else if (res.includes('i')) res = res.replace('i', toneChars['i'][idx]);
            else if (res.includes('u')) res = res.replace('u', toneChars['u'][idx]);
            else if (res.includes('v')) res = res.replace('v', toneChars['ü'][idx]);
            return res.replace('v', 'ü');
        }

                'ǖ': 'ü', 'ǘ': 'ü', 'ǚ': 'ü', 'ǜ': 'ü'
            };
            function split(p) {
                let b = "";
                for (let c of p) b += toneMap[c] || c;
                let s = "";
                for (let sm of smList) { if (b.startsWith(sm)) { s = sm; break; } }
                return { s, y: b.substring(s.length) };

            initAudio();
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(vol, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
            o.start(); o.stop(audioCtx.currentTime + dur);
        }
